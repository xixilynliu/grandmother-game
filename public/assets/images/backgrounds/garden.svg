  <circle cx="500" cy="750" r="12" fill="#ff1493"/>
  <circle cx="600" cy="720" r="18" fill="#ff69b4"/>
  <circle cx="1300" cy="730" r="15" fill="#ffb6c1"/>
  <circle cx="1400" cy="700" r="12" fill="#ff69b4"/>
