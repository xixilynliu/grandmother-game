<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2d1b4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a3e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="floor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b7355;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5d4e37;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <!-- 地板 -->
  <rect y="700" width="1920" height="380" fill="url(#floor)"/>
  <!-- 窗户 -->
  <rect x="200" y="100" width="300" height="400" rx="20" fill="#2a1a4a" stroke="#c9a96e" stroke-width="8"/>
  <rect x="810" y="100" width="300" height="400" rx="20" fill="#2a1a4a" stroke="#c9a96e" stroke-width="8"/>
  <rect x="1420" y="100" width="300" height="400" rx="20" fill="#2a1a4a" stroke="#c9a96e" stroke-width="8"/>
  <!-- 窗帘 -->
  <path d="M200 100 Q350 200 200 500" fill="#8b0000" opacity="0.7"/>
  <path d="M500 100 Q350 200 500 500" fill="#8b0000" opacity="0.7"/>
  <!-- 吊灯 -->
  <ellipse cx="960" cy="80" rx="150" ry="40" fill="#ffd700" opacity="0.3"/>
  <circle cx="960" cy="120" r="60" fill="#ffd700" opacity="0.5"/>
  <!-- 装饰文字 -->
  <text x="960" y="650" text-anchor="middle" fill="#c9a96e" font-size="48" font-family="serif" opacity="0.6">宴会厅</text>
</svg>