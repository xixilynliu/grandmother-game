<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="lrwall" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5dc"/>
      <stop offset="100%" style="stop-color:#e8dcc8"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#lrwall)"/>
  <rect y="750" width="1920" height="330" fill="#8b7355"/>
  <!-- 沙发 -->
  <rect x="200" y="500" width="700" height="200" rx="30" fill="#8b0000"/>
  <rect x="180" y="480" width="100" height="240" rx="20" fill="#8b0000"/>
  <rect x="820" y="480" width="100" height="240" rx="20" fill="#8b0000"/>
  <!-- 茶几 -->
  <rect x="400" y="720" width="300" height="80" fill="#5d4037"/>
  <rect x="420" y="750" width="20" height="80" fill="#3e2723"/>
  <rect x="660" y="750" width="20" height="80" fill="#3e2723"/>
  <!-- 电视 -->
  <rect x="1200" y="300" width="500" height="300" fill="#1a1a1a" rx="10"/>
  <rect x="1220" y="320" width="460" height="260" fill="#333"/>
  <!-- 电视柜 -->
  <rect x="1150" y="620" width="600" height="100" fill="#5d4037"/>
  <!-- 装饰画 -->
  <rect x="500" y="200" width="200" height="150" fill="#fff" stroke="#c9a96e" stroke-width="8"/>
  <rect x="520" y="220" width="160" height="110" fill="#87ceeb"/>
  <text x="960" y="950" text-anchor="middle" fill="#8b7355" font-size="48" font-family="serif" opacity="0.5">客厅</text>
</svg>