<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="wallpaper" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5e6d3"/>
      <stop offset="100%" style="stop-color:#e8d4c4"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#wallpaper)"/>
  <rect y="800" width="1920" height="280" fill="#8b7355"/>
  <!-- 床 -->
  <rect x="200" y="400" width="700" height="350" rx="20" fill="#8b4513"/>
  <rect x="220" y="420" width="660" height="200" fill="#fff8dc"/>
  <rect x="220" y="420" width="660" height="80" fill="#ffc0cb" opacity="0.5"/>
  <!-- 床头柜 -->
  <rect x="950" y="500" width="120" height="150" fill="#8b4513"/>
  <!-- 台灯 -->
  <ellipse cx="1010" cy="480" rx="40" ry="20" fill="#fffacd"/>
  <rect x="1000" y="450" width="20" height="50" fill="#daa520"/>
  <!-- 窗户 -->
  <rect x="1300" y="150" width="400" height="500" fill="#87ceeb" stroke="#8b7355" stroke-width="10"/>
  <line x1="1500" y1="150" x2="1500" y2="650" stroke="#8b7355" stroke-width="6"/>
  <line x1="1300" y1="400" x2="1700" y2="400" stroke="#8b7355" stroke-width="6"/>
  <!-- 窗帘 -->
  <rect x="1250" y="100" width="100" height="600" fill="#ffb6c1" opacity="0.7"/>
  <rect x="1700" y="100" width="100" height="600" fill="#ffb6c1" opacity="0.7"/>
  <text x="960" y="950" text-anchor="middle" fill="#8b7355" font-size="48" font-family="serif" opacity="0.5">卧室</text>
</svg>