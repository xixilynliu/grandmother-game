  <text x="960" y="190" text-anchor="middle" fill="#8b0000" font-size="28" font-family="serif">育英中学</text>
  <text x="960" y="950" text-anchor="middle" fill="#333" font-size="48" font-family="sans-serif" opacity="0.5">学校</text>
</svg>