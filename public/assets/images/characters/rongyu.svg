<svg xmlns="http://www.w3.org/2000/svg" width="400" height="800" viewBox="0 0 400 800">
  <defs>
    <linearGradient id="hair" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#333"/>
    </linearGradient>
    <linearGradient id="dress" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b0000"/>
      <stop offset="100%" style="stop-color:#4a0000"/>
    </linearGradient>
  </defs>
  <!-- 头发 -->
  <ellipse cx="200" cy="120" rx="90" ry="100" fill="url(#hair)"/>
  <path d="M110 120 Q100 250 130 350" fill="url(#hair)"/>
  <path d="M290 120 Q300 250 270 350" fill="url(#hair)"/>
  <!-- 脸 -->
  <ellipse cx="200" cy="140" rx="65" ry="75" fill="#ffecd2"/>
  <!-- 眼睛 -->
  <ellipse cx="170" cy="130" rx="15" ry="10" fill="#fff"/>
  <ellipse cx="230" cy="130" rx="15" ry="10" fill="#fff"/>
  <circle cx="170" cy="130" r="6" fill="#4a2c00"/>
  <circle cx="230" cy="130" r="6" fill="#4a2c00"/>
  <circle cx="172" cy="128" r="2" fill="#fff"/>
  <circle cx="232" cy="128" r="2" fill="#fff"/>
  <!-- 眉毛 -->
  <path d="M150 110 Q170 105 190 112" stroke="#333" stroke-width="2" fill="none"/>
  <path d="M210 112 Q230 105 250 110" stroke="#333" stroke-width="2" fill="none"/>
  <!-- 鼻子 -->
  <path d="M200 145 L195 165 L205 165" stroke="#deb887" stroke-width="1" fill="none"/>
  <!-- 嘴巴 -->
  <path d="M180 180 Q200 195 220 180" stroke="#cc6666" stroke-width="3" fill="none"/>
  <!-- 腮红 -->
  <ellipse cx="150" cy="160" rx="15" ry="10" fill="#ffb6c1" opacity="0.4"/>
  <ellipse cx="250" cy="160" rx="15" ry="10" fill="#ffb6c1" opacity="0.4"/>
  <!-- 脖子 -->
  <rect x="180" y="200" width="40" height="50" fill="#ffecd2"/>
  <!-- 旗袍 -->
  <path d="M140 250 Q130 400 150 700 L250 700 Q270 400 260 250 Z" fill="url(#dress)"/>
  <path d="M150 250 Q200 280 250 250" stroke="#ffd700" stroke-width="2" fill="none"/>
  <!-- 领口 -->
  <path d="M180 250 L200 280 L220 250" stroke="#ffd700" stroke-width="3" fill="none"/>
  <!-- 手臂 -->
  <path d="M140 280 Q100 350 120 450" stroke="#ffecd2" stroke-width="25" fill="none" stroke-linecap="round"/>
  <path d="M260 280 Q300 350 280 450" stroke="#ffecd2" stroke-width="25" fill="none" stroke-linecap="round"/>
  <!-- 发饰 -->
  <circle cx="150" cy="80" r="12" fill="#ffd700"/>
  <circle cx="250" cy="80" r="12" fill="#ffd700"/>
  <!-- 名字 -->
  <text x="200" y="780" text-anchor="middle" fill="#8b0000" font-size="24" font-family="serif">容玉</text>
</svg>